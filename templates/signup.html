{% extends "base.html" %}

{% block content %}
<section class="auth-section">
    <h2>Регистрация</h2>
    
    <form action="/signup" method="post" class="auth-form">
        <div class="form-group">
            <label for="name">Имя</label>
            <input type="text" name="name" placeholder="Ваше имя" required>
        </div>
        <div class="form-group">
            <label for="name">Фамилия</label>
            <input type="text" name="last_name" placeholder="Ваша фамилия" required>
        </div>
        <div class="form-group">
            <label for="email">Электронная почта</label>
            <input type="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
            <label for="password">Пароль</label>
            <input type="password" name="password" placeholder="Минимум 6 символов" required>
        </div>
        <div class="form-group">
            <label for="confirm_password">Подтвердите пароль</label>
            <input type="password" name="confirm_password" placeholder="Повторите пароль" required>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-signup">Зарегистрироваться</button>
        </div>
        <p class="help-link">
            Уже есть аккаунт? <a href="/signin">Войти</a>
        </p>
    </form>
</section>
{% endblock %}
